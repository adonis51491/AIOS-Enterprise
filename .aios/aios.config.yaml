schema_version: "1"
product: "AIOS Enterprise"
version_source: ".aios/version.json"
task_sources:
  priority: "STATUS.md"
  specification: "BUGS.md"
  acceptance: "ACCEPTANCE.md"
  selected_task: ".aios/reports/TODAY_CHECKLIST.md"
workflow:
  stages:
    - CHECKLIST
    - PLAN
    - WAIT_FOR_APPROVAL
    - IMPLEMENT
    - VALIDATE
    - REPORT
safety:
  require_plan_approval: true
  allow_package_upgrade: false
  allow_env_edit: false
  allow_auto_commit: false
  allow_auto_push: false
encoding: "UTF-8"
