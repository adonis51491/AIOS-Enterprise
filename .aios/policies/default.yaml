policies:
  plan:
    edit_files: false
    install_packages: false
    upgrade_packages: false
    read_full_git_history: false
    scan_whole_repository: false
  implement:
    require_explicit_approval: true
    edit_only_approved_files: true
    commit: false
    push: false
  protected:
    - ".env"
    - ".env.*"
    - "package.json"
    - "package-lock.json"
    - "pnpm-lock.yaml"
    - "yarn.lock"
  validation:
    evidence_required_for_pass: true
    ui_checks_status: "HUMAN_CHECK_REQUIRED"
