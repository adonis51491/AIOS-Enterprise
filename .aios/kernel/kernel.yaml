kernel:
  name: "AIOS Enterprise Kernel"
  mode: "document-driven"
  task_selection:
    source: "STATUS.md"
    fallback: "first OPEN item in BUGS.md"
  readiness_gate:
    require_selected_bug: true
    require_acceptance_mapping: true
    require_no_blocker: true
  execution:
    plan_before_implement: true
    stop_after_plan_without_approval: true
    minimal_scope: true
